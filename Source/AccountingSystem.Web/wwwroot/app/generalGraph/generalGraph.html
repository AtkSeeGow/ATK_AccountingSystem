<div class="row">
    <div class="col-lg-12">
        <div class="card">
            <div class="card-body ">
                <div class="row">
                    <div class="col-lg-2 col-md-12">
                        <div class="form-group">
                            <label>名稱</label>
                            <autocompleteUtilityComponent [autocompleteUtilityModel]="bookNameAutocompleteUtilityModel"></autocompleteUtilityComponent>
                        </div>
                    </div>﻿
                    <div class="col-lg-2 col-md-12">
                        <div class="form-group">
                            <label>會計科目</label>
                            <autocompleteUtilityComponent [autocompleteUtilityModel]="accountingSubjectAutocompleteUtilityModel"></autocompleteUtilityComponent>
                        </div>
                    </div>﻿
                    <div class="col-lg-2 col-md-12">
                        <div class="form-group">
                            <label>摘要</label>
                            <input type="text" class="form-control" name="entrySummary" value="" [(ngModel)]="conditionForView.summary" />
                        </div>
                    </div>﻿
                    <div class="col-lg-3 col-md-12">
                        <div class="form-group">
                            <label>交易日起</label>
                            <my-date-picker name="tradingDayBegin" [(ngModel)]="conditionForView.tradingDayBegin" [options]="DatePickerUtility.DatePickerOptions"
                                            (inputFieldChanged)="DatePickerUtility.OnDateFieldChanged($event, conditionForView, 'tradingDayBegin')" required></my-date-picker>
                        </div>
                    </div>﻿
                    <div class="col-lg-3 col-md-12">
                        <div class="form-group">
                            <label>交易日迄</label>
                            <my-date-picker name="tradingDayEnd" [(ngModel)]="conditionForView.tradingDayEnd" [options]="DatePickerUtility.DatePickerOptions"
                                            (inputFieldChanged)="DatePickerUtility.OnDateFieldChanged($event, conditionForView, 'tradingDayEnd')" required></my-date-picker>
                        </div>
                    </div>﻿
                </div>
                <div class="row">
                    <div class="col-lg-6 col-md-12">
                        <div class="form-group">
                            <button (click)="filter()" type="submit" class="btn btn-default" style="width:100%">查詢</button>
                        </div>
                    </div>
                    <div class="col-lg-6 col-md-12">
                        <div class="form-group">
                            <button (click)="clear()" type="reset" class="btn btn-default" style="width:100%">清空</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
