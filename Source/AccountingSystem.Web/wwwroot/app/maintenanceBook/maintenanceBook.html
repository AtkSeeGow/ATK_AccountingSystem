<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="col-lg-6 col-md-12">
                        <div class="form-group">
                            <label>名稱</label>
                            <autocompleteUtilityComponent [autocompleteUtilityModel]="nameAutocompleteUtilityModel"></autocompleteUtilityComponent>
                        </div>
                    </div>﻿
                    <div class="col-lg-6 col-md-12">
                        <div class="form-group">
                            <label>使用者</label>
                            <input type="text" class="form-control" name="reader" value="" [(ngModel)]="conditionForView.reader" />
                        </div>
                    </div>﻿
                </div>
                <div class="row">
                    <div class="col-lg-6 col-md-12">
                        <div class="form-group">
                            <button (click)="filter(false)" type="submit" class="btn btn-default" style="width: 100%">查詢</button>
                        </div>
                    </div>
                    <div class="col-lg-6 col-md-12">
                        <div class="form-group">
                            <button (click)="clear()" type="reset" class="btn btn-default" style="width: 100%">清空</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="panel panel-default">
                            <div class="panel-heading">
                                <p></p>
                            </div>
                            <div class="panel-body">
                                <div class="row">
                                    <div class="col-lg-12">
                                        <div class="form-group" style="text-align:right">
                                            <button (click)="save()" type="submit" class="btn btn-default">儲存</button>
                                        </div>
                                        <div class="form-group">
                                            <hot-table [hotId]="handsontableId"
                                                       [settings]="handsontableGridSettings"
                                                       [data]="books">
                                            </hot-table>
                                        </div>
                                        <div class="form-group" style="text-align:right">
                                            <button (click)="save()" type="submit" class="btn btn-default">儲存</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<modalUtilityComponent [modalUtilityModel]="confirmMessageModal"></modalUtilityComponent>
