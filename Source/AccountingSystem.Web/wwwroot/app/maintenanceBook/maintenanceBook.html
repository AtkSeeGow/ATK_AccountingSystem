<div class="row">
    <div class="col-lg-12">
        <h1 class="page-header">Maintenance Book</h1>
    </div>
</div>

<div class="row">
    <div class="col-lg-12">
        <div class="panel panel-default">
            <div class="panel-heading">
                <p></p>
            </div>
            <div class="panel-body">
                <div class="row">
                    <div class="col-lg-5">
                        <div class="form-group">
                            <label for="bookName" class="text-info">Name:</label>
                            <autocompleteUtilityComponent [autocompleteUtilityModel]="nameAutocompleteUtilityModel"></autocompleteUtilityComponent>
                        </div>
                    </div>﻿
                    <div class="col-lg-5">
                        <div class="form-group">
                            <label for="bookReader" class="text-info">Reader:</label>
                            <input type="text" class="form-control" name="bookReader" value="" [(ngModel)]="conditionForView.bookReader" />
                        </div>
                    </div>﻿
                    <div class="col-lg-2" style="text-align: center;">
                        <div class="form-group">
                            <br />
                            <button (click)="filter(false)" type="submit" class="btn btn-default">Filter</button>
                            <button (click)="clear()" type="reset" class="btn btn-default">Clear</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-lg-12">
        <div class="panel panel-default">
            <div class="panel-heading">
                <p></p>
            </div>
            <div class="panel-body">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="form-group" style="text-align:right">
                            <button (click)="save()" type="submit" class="btn btn-default">Save</button>
                        </div>
                        <div class="form-group">
                            <hot-table [hotId]="handsontableId"
                                       [settings]="handsontableGridSettings"
                                       [data]="books">
                            </hot-table>
                        </div>
                        <div class="form-group" style="text-align:right">
                            <button (click)="save()" type="submit" class="btn btn-default">Save</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<modalUtilityComponent [modalUtilityModel]="confirmMessageModal"></modalUtilityComponent>
<modalUtilityComponent [modalUtilityModel]="completeMessageModal"></modalUtilityComponent>
<modalUtilityComponent [modalUtilityModel]="errorMessageModal"></modalUtilityComponent>
