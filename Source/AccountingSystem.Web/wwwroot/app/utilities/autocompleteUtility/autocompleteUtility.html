<span [id]="elementId" style="position:relative" class="js-autoComplete">
    <input type="text"
           class="form-control"
           [maxlength]="autocompleteUtilityModel.maxlength"
           [placeholder]="autocompleteUtilityModel.placeholder"
           (keyup)="autocompleteUtilityModel.keyup($event)"
           (click)="autocompleteUtilityModel.click($event)"
           [(ngModel)]="autocompleteUtilityModel.inputValue"
           [ngModelOptions]="{standalone: true}"
           autocomplete="off">
    <ul id="ui-id-1"
        class="ui-menu ui-widget ui-autocomplete ui-front"
        [style.display]="autocompleteUtilityModel.isDisplay? 'block' : 'none'"
        style="width: 196px; height: 380px; z-index: 999"></ul>
</span>
