<div class="row">
    <div class="col-lg-12">
        <h1 class="page-header">日記簿</h1>
    </div>
</div>

<div class="row">
    <div class="col-lg-6 col-md-12">
        <div class="card">
            <div class="card-body ">
                <div class="row">
                    <div class="col-md-12">
                        <h3 class="card-title">查詢</h3>
                    </div>
                </div>
                <div class="row">
                    <div class="col-lg-6 col-md-12">
                        <div class="form-group">
                            <label>名稱</label>
                            <autocompleteUtilityComponent [autocompleteUtilityModel]="nameAutocompleteUtilityModel"></autocompleteUtilityComponent>
                        </div>
                    </div>
                    <div class="col-lg-6 col-md-12">
                        <div class="form-group">
                            <label>會計科目</label>
                            <autocompleteUtilityComponent [autocompleteUtilityModel]="accountingSubjectAutocompleteUtilityModel"></autocompleteUtilityComponent>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-lg-6 col-md-12">
                        <div class="form-group">
                            <label for="tradingDayBegin">交易日起</label>
                            <my-date-picker name="tradingDayBegin" [(ngModel)]="conditionForView.tradingDayBegin" [options]="DatePickerUtility.DatePickerOptions"
                                            (inputFieldChanged)="DatePickerUtility.OnDateFieldChanged($event, conditionForView, 'tradingDayBegin')" required></my-date-picker>
                        </div>
                    </div>﻿
                    <div class="col-lg-6 col-md-12">
                        <div class="form-group">
                            <label for="tradingDayEnd">交易日迄</label>
                            <my-date-picker name="tradingDayEnd" [(ngModel)]="conditionForView.tradingDayEnd" [options]="DatePickerUtility.DatePickerOptions"
                                            (inputFieldChanged)="DatePickerUtility.OnDateFieldChanged($event, conditionForView, 'tradingDayEnd')" required></my-date-picker>
                        </div>
                    </div>﻿
                </div>
                <div class="row">
                    <div class="col-lg-6 col-md-12">
                        <div class="form-group">
                            <label for="summary">摘要</label>
                            <input type="text" class="form-control" name="summary" value="" [(ngModel)]="conditionForView.summary" />
                        </div>
                    </div>﻿
                    <div class="col-lg-6 col-md-12" style="text-align: center;">
                        <div class="form-group" style="margin-top: 25px">
                            <button (click)="filter()" type="submit" class="btn btn-default" style="width:45%">查詢</button>
                            <button (click)="clear()" type="reset" class="btn btn-default" style="width:45%">清空</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-lg-6 col-md-12">
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-12">
                        <h3 class="card-title">新增</h3>
                    </div>
                </div>
                <div class="row">
                    <div class="col-lg-6 col-md-12">
                        <div class="form-group">
                            <label>日期</label>
                            <input type="text" class="form-control" [(ngModel)]="detail.tradingDay" style="font-size: 20px">
                        </div>
                    </div>
                    <div class="col-lg-6 col-md-12">
                        <div class="form-group">
                            <label>名稱</label>
                            <input type="text" class="form-control" [(ngModel)]="detail.name" style="font-size: 20px">
                        </div>
                    </div>
                </div>
                <div class="col-lg-12" style="padding-left:0px; padding-right:0px">
                    <div class="form-group">
                        <hot-table [hotId]="detail.id"
                                   [settings]="handsontableGridSettings"
                                   [data]="detail.entrys">
                        </hot-table>
                    </div>
                </div>
                <button (click)="save(detail)" type="submit" class="btn btn-default" style="width:100%">送出</button>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-lg-6 col-md-12" *ngFor="let detail of details; let i=index;">
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="col-lg-6 col-md-12">
                        <div class="form-group">
                            <label>日期</label>
                            <input type="text" class="form-control" [(ngModel)]="detail.tradingDay" style="font-size: 20px">
                        </div>
                    </div>
                    <div class="col-lg-6 col-md-12">
                        <div class="form-group">
                            <label>名稱</label>
                            <input type="text" class="form-control" [(ngModel)]="detail.name" style="font-size: 20px">
                        </div>
                    </div>
                </div>
                <div class="col-lg-12" style="padding-left:0px; padding-right:0px">
                    <div class="form-group">
                        <hot-table [hotId]="detail.id"
                                   [settings]="handsontableGridSettings"
                                   [data]="detail.entrys">
                        </hot-table>
                    </div>
                </div>
                <div class="row">
                    <div class="col-lg-6 col-md-12" >
                        <button (click)="save(detail)" type="submit" class="btn btn-default" style="width:100%">送出</button>
                    </div>
                    <div class="col-lg-6 col-md-12">
                        <button (click)="delete(detail)" type="submit" class="btn btn-warning" style="width:100%">刪除</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
