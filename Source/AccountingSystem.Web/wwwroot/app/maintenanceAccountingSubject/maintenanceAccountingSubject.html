<div class="row">
    <div class="col-lg-12">
        <h1 class="page-header">Maintenance Accounting Subject</h1>
    </div>
</div>

<div class="row">
    <div class="col-lg-12">
        <div class="panel panel-default">
            <div class="panel-heading">
                <p></p>
            </div>
            <div class="panel-body">
                <div class="row">
                    <div class="col-lg-2">
                        <div class="form-group">
                            <label for="accountingSubjectType" class="text-info">Type:</label>
                            <select class="form-control" [(ngModel)]="conditionForView.accountingSubjectType">
                                <option value="">All</option>
                                <option value="Assets">Assets</option>
                                <option value="Liabilities">Liabilities</option>
                                <option value="OwnerEquity">OwnerEquity</option>
                                <option value="Revenues">Revenues</option>
                                <option value="Expenses">Expenses</option>
                            </select>
                        </div>
                    </div>﻿
                    <div class="col-lg-2">
                        <div class="form-group">
                            <label for="accountingSubjectCode" class="text-info">Code:</label>
                            <input type="text" class="form-control" name="accountingSubjectCode" [(ngModel)]="conditionForView.accountingSubjectCode" value="" />
                        </div>
                    </div>﻿
                    <div class="col-lg-3">
                        <div class="form-group">
                            <label for="accountingSubjectName" class="text-info">Name:</label>
                            <input type="text" class="form-control" name="accountingSubjectName" [(ngModel)]="conditionForView.accountingSubjectName" value="" />
                        </div>
                    </div>
                    <div class="col-lg-3">
                        <div class="form-group">
                            <label for="accountingSubjectDescription" class="text-info">Description:</label>
                            <input type="text" class="form-control" name="accountingSubjectDescription" [(ngModel)]="conditionForView.accountingSubjectDescription" value="" />
                        </div>
                    </div>
                    <div class="col-lg-2" style="text-align: center;">
                        <div class="form-group">
                            <br />
                            <button (click)="filter(false)" type="submit" class="btn btn-default">Filter</button>
                            <button (click)="clear()" type="reset" class="btn btn-default">Clear</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-lg-12">
        <div class="panel panel-default">
            <div class="panel-heading">
                <p></p>
            </div>
            <div class="panel-body">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="form-group" style="text-align:right">
                            <button (click)="save()" type="submit" class="btn btn-default">Save</button>
                        </div>
                        <div class="form-group">
                            <hot-table [hotId]="handsontableId"
                                       [settings]="handsontableGridSettings"
                                       [data]="accountingSubjects">
                            </hot-table>
                        </div>
                        <div class="form-group" style="text-align:right">
                            <button (click)="save()" type="submit" class="btn btn-default">Save</button>
                        </div>
                    </div>
                    </div>
            </div>
        </div>
    </div>
</div>

<modalUtilityComponent [modalUtilityModel]="confirmMessageModal"></modalUtilityComponent>
<modalUtilityComponent [modalUtilityModel]="completeMessageModal"></modalUtilityComponent>
<modalUtilityComponent [modalUtilityModel]="errorMessageModal"></modalUtilityComponent>
