<div class="row">
    <div class="col-lg-12">
        <h1 class="page-header">General Journal</h1>
    </div>
</div>

<div class="row">
    <div class="col-lg-12">
        <div class="panel panel-default">
            <div class="panel-heading">
                <p></p>
            </div>
            <div class="panel-body">
                <div class="row">
                    <div class="col-lg-2">
                        <div class="form-group">
                            <label for="entryBookName" class="text-info">Book Name:</label>
                            <autocompleteUtilityComponent [autocompleteUtilityModel]="bookNameAutocompleteUtilityModel"></autocompleteUtilityComponent>
                        </div>
                    </div>﻿
                    <div class="col-lg-4">
                        <div class="form-group">
                            <label for="entryAccountingSubject" class="text-info">Accounting Subject:</label>
                            <autocompleteUtilityComponent  [autocompleteUtilityModel]="accountingSubjectAutocompleteUtilityModel"></autocompleteUtilityComponent>
                        </div>
                    </div>﻿
                    <div class="col-lg-3">
                        <div class="form-group">
                            <label for="entryTradingDayBegin" class="text-info">Trading Day Begin:</label>
                            <my-date-picker name="entryTradingDayBegin" [(ngModel)]="conditionForView.entryTradingDayBegin" [options]="DatePickerUtility.DatePickerOptions"
                                            (inputFieldChanged)="DatePickerUtility.OnDateFieldChanged($event, conditionForView, 'entryTradingDayBegin')" required></my-date-picker>
                        </div>
                    </div>﻿
                    <div class="col-lg-3">
                        <div class="form-group">
                            <label for="entryTradingDayEnd" class="text-info">Trading Day End:</label>
                            <my-date-picker name="entryTradingDayEnd" [(ngModel)]="conditionForView.entryTradingDayEnd" [options]="DatePickerUtility.DatePickerOptions"
                                            (inputFieldChanged)="DatePickerUtility.OnDateFieldChanged($event, conditionForView, 'entryTradingDayEnd')" required></my-date-picker>
                        </div>
                    </div>﻿
                </div>
                <div class="row">
                    <div class="col-lg-10">
                        <div class="form-group">
                            <label for="entrySummary" class="text-info">Summary:</label>
                            <input type="text" class="form-control" name="entrySummary" value="" [(ngModel)]="conditionForView.entrySummary" />
                        </div>
                        <div class="checkbox">
                            <label>
                                <input name="isByDate" [(ngModel)]="conditionForView.entryIsByDate" type="checkbox" (ngModelChange)="conditionForView.entryIsByDate=$event?true:false">Is By Date
                            </label>
                        </div>
                    </div>﻿
                    <div class="col-lg-2" style="text-align: center;">
                        <div class="form-group">
                            <br/>
                            <button (click)="filter(false)" type="submit" class="btn btn-default">Filter</button>
                            <button (click)="clear()" type="reset" class="btn btn-default">Clear</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-lg-12">
        <div class="panel panel-default">
            <div class="panel-heading">
                <p></p>
            </div>
            <div class="panel-body">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="form-group" style="text-align:right">
                            <button (click)="save()" type="submit" class="btn btn-default">Save</button>
                        </div>
                        <div class="form-group">
                            <hot-table [hotId]="handsontableId"
                                       [settings]="handsontableGridSettings"
                                       [data]="entrys">
                            </hot-table>
                        </div>
                        <div class="form-group" style="text-align:right">
                            <button (click)="save()" type="submit" class="btn btn-default">Save</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<modalUtilityComponent [modalUtilityModel]="confirmMessageModal"></modalUtilityComponent>
<modalUtilityComponent [modalUtilityModel]="completeMessageModal"></modalUtilityComponent>
<modalUtilityComponent [modalUtilityModel]="errorMessageModal"></modalUtilityComponent>
